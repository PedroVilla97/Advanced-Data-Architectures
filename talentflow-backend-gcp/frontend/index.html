<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentFlow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }

        h1 { color: #333; }

        .screen { display: none; }
        .screen.active { display: block; }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px 0;
        }

        button:hover { background-color: #45a049; }

        /* Freelancer kaart styling */
        .freelancer-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .freelancer-card h3 { margin: 0 0 10px 0; }

        .match-score {
            color: #4CAF50;
            font-weight: bold;
        }

        .skills {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>TalentFlow</h1>

    <!-- Scherm 1: Job Submission -->
    <div id="screen-job" class="screen active">
        <h2>Submit a Job</h2>
        <p>Describe the job you need done:</p>

        <textarea id="job-description" placeholder="E.g. We need a React and Firebase developer for a dashboard project with a budget of 40"></textarea>
        <label>Number of matches:</label>
        <input type="number" id="top-k" value="3" min="1" max="10">
        <br><br>
        <br>
        <button onclick="submitJob()">Find Freelancers</button>

        <p id="job-error" style="color: red;"></p>
    </div>

    <!-- Scherm 2: Shortlist Results -->
    <div id="screen-shortlist" class="screen">
        <h2>Matching Freelancers</h2>
        <p id="shortlist-subtitle"></p>

        <!-- Freelancer kaarten komen hier -->
        <div id="shortlist-results"></div>

        <button onclick="showScreen('screen-job')">← Back</button>
    </div>

    <!-- Scherm 3 en 4 komen later -->

    <script>
        const API_BASE = "http://localhost:8000";

        // Globale variabele om de match data op te slaan voor gebruik in scherm 3
        let currentMatch = null;

        // Scherm wisselen
        function showScreen(screenId) {
            // Verberg alle schermen
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            // Toon het gewenste scherm
            document.getElementById(screenId).classList.add("active");
        }

        async function submitJob() {
            const description = document.getElementById("job-description").value;

            if (!description.trim()) {
                document.getElementById("job-error").textContent = "Please enter a job description.";
                return;
            }

            try {
                const topK = parseInt(document.getElementById("top-k").value) || 3;
                const response = await fetch(`${API_BASE}/match`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ description: description, top_k: topK })
                });

                const data = await response.json();

                // Sla de match data op voor later gebruik
                currentMatch = data;

                // Toon de shortlist
                showShortlist(data);

            } catch (error) {
                document.getElementById("job-error").textContent = "Could not connect to backend. Is Docker running?";
            }
        }

        function showShortlist(data) {
            // Toon hoeveel skills gevonden zijn
            const skills = data.parsed_job.skills.join(", ");
            document.getElementById("shortlist-subtitle").textContent =
                `Found matches for skills: ${skills}`;

            // Bouw de freelancer kaarten
            const container = document.getElementById("shortlist-results");
            container.innerHTML = ""; // leegmaken voor nieuwe resultaten

            data.shortlist.forEach(match => {
                const card = document.createElement("div");
                card.className = "freelancer-card";
                card.innerHTML = `
                    <h3>${match.freelancer.name}</h3>
                    <p class="match-score">Match score: ${match.match_score}</p>
                    <p class="skills">Skills: ${match.freelancer.skills.join(", ")}</p>
                    <p>Hourly rate: €${match.freelancer.hourly_rate}/hr</p>
                    <p>Reputation: ${match.freelancer.reputation_score}/5</p>
                    <button onclick="selectFreelancer('${match.freelancer.freelancer_id}', '${match.freelancer.name}')">
                        Select this freelancer
                    </button>
                `;
                container.appendChild(card);
            });

            // Ga naar scherm 2
            showScreen("screen-shortlist");
        }

        function selectFreelancer(freelancerId, freelancerName) {
            // Scherm 3 komt hier later
            alert(`Selected: ${freelancerName} — Contract screen coming soon!`);
        }
    </script>

</body>
</html>
